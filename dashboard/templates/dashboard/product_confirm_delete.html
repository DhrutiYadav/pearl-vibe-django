{% extends 'dashboard/base.html' %}

{% block content %}

<div class="container mt-5">

<div class="card shadow-sm p-4" style="max-width:600px;margin:auto">

<h3 class="text-danger mb-4">Delete Product</h3>

<div class="row mb-3">
<div class="col-md-4"><strong>Product Name</strong></div>
<div class="col-md-8">{{ product.name }}</div>
</div>

<hr>

<form method="POST">
{% csrf_token %}

<button type="submit" class="btn btn-primary">
Yes, Delete
</button>

<a href="{% url 'dashboard:dashboard_products' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>
</div>

{% endblock %}
