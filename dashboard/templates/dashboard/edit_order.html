{% extends 'dashboard/base.html' %}

{% block content %}
<h2>Edit Order #{{ order.id }}</h2>

<form method="POST">
    {% csrf_token %}

    <label>Order Status:</label>
    <select name="order_status">
        <option value="Placed" {% if order.order_status == "Placed" %}selected{% endif %}>Placed</option>
        <option value="Shipped" {% if order.order_status == "Shipped" %}selected{% endif %}>Shipped</option>
        <option value="Delivered" {% if order.order_status == "Delivered" %}selected{% endif %}>Delivered</option>
        <option value="Cancelled" {% if order.order_status == "Cancelled" %}selected{% endif %}>Cancelled</option>
    </select>
    <br><br>

    <label>Order Date:</label>
    <input type="datetime-local" name="date_ordered"
        value="{{ order.date_ordered|date:'Y-m-d\\TH:i' }}">

    <br><br>
    <button type="submit">Save Changes</button>
</form>

<br>
<a href="{% url 'dashboard:orders' %}">Back to Orders</a>
{% endblock %}
